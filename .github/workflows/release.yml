name: Release

# Triggered by pushing a tag like v1.2.3 -- that one tag drives everything:
# py's version (via setuptools_scm, root=".." in py/pyproject.toml), and
# dart/pubspec.yaml + js/package.json (bumped in place by bump-versions
# below and committed to main). Rename the root CHANGELOG.md's
# "## [Unreleased]" heading to "## [X.Y.Z] - DATE" (and add a fresh empty
# "## [Unreleased]" above it) *before* tagging -- this workflow reads
# whatever's under the matching version heading for release notes, falling
# back to [Unreleased] (with a warning) if you forget.
on:
  push:
    tags:
      - "v*"

env:
  RELEASE_TAG: ${{ github.ref_name }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── run each package's own CI as reusable workflows ─────────────────────
  test-python:
    uses: ./.github/workflows/py.yml

  test-js:
    uses: ./.github/workflows/js.yml

  test-dart:
    uses: ./.github/workflows/dart.yml

  test-go:
    uses: ./.github/workflows/go.yml

  # Single guard job downstream jobs depend on, instead of each repeating
  # the full test-* job list -- adding a language later only means adding
  # it here, not hunting down every job's `needs:`.
  tests-passed:
    needs: [test-python, test-js, test-dart, test-go]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All test legs passed."

  # ── bump dart/pubspec.yaml + js/package.json to the tag's version,
  # sync CHANGELOG.md into each package, commit + push to main ───────────
  bump-versions:
    needs: tests-passed
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - name: Extract version and detect pre-release
        id: meta
        run: |
          VERSION="${RELEASE_TAG#v}"
          if [[ "$RELEASE_TAG" =~ (alpha|beta|rc) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # py isn't bumped here: setuptools_scm (py/pyproject.toml, root="..")
      # derives its version directly from this same tag. go/ isn't bumped
      # either, for a stronger reason -- go.mod lives at the repo root
      # (module github.com/o-murphy/a7p, see docs/DESIGN-schema-unification.md),
      # so this same "v*" tag *is* its module version already; there's no
      # manifest field to touch at all. (go/CHANGELOG.md still gets
      # regenerated below, same as py/js/dart -- only the version *number*
      # has nothing to bump.)
      - name: Bump dart/pubspec.yaml and js/package.json (lockstep)
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          sed -i "s/^version: .*/version: $VERSION/" dart/pubspec.yaml
          sed -i "s/^  \"version\": \".*\"/  \"version\": \"$VERSION\"/" js/package.json
          grep '^version:' dart/pubspec.yaml
          grep '"version":' js/package.json

      - name: Regenerate py/js/dart/go CHANGELOG.md from the root file
        run: python3 scripts/ci/sync_changelogs.py

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dart/pubspec.yaml js/package.json py/CHANGELOG.md js/CHANGELOG.md dart/CHANGELOG.md go/CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.meta.outputs.version }}"
          git push origin main

  # ── create the GitHub release ────────────────────────────────────────────
  create-release:
    needs: bump-versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Post-bump (bump-versions pushed to main just above). fetch-tags:
      # true -- actions/checkout@v7 defaults this to false independently of
      # fetch-depth: 0.
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ needs.bump-versions.outputs.version }}"
          ./scripts/ci/extract-changelog.sh "$VERSION" CHANGELOG.md > /tmp/release_notes.md

          if [ ! -s /tmp/release_notes.md ]; then
            echo "No changelog entry found for $VERSION (or [Unreleased]) in CHANGELOG.md -- add one first"
            exit 1
          fi

          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${RELEASE_TAG}$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            {
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${RELEASE_TAG}"
            } >> /tmp/release_notes.md
          fi

          echo "--- release notes ---"
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: /tmp/release_notes.md
          prerelease: ${{ needs.bump-versions.outputs.prerelease }}

  # ── publish a7p to PyPI ──────────────────────────────────────────────────
  publish-py:
    needs: [bump-versions, create-release]
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write # PyPI trusted publishing
    defaults:
      run:
        working-directory: py
    steps:
      # fetch-depth: 0 AND fetch-tags: true -- setuptools_scm derives the
      # version from the git tag via `git describe`; py/pyproject.toml's
      # [tool.setuptools_scm] root=".." points it at this checkout's root.
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990

      - name: Install the project
        run: uv sync --dev

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish --trusted-publishing always

  # ── publish a7p-js to npm ────────────────────────────────────────────────
  publish-js:
    needs: [bump-versions, create-release]
    runs-on: ubuntu-latest
    environment: npmjs
    permissions:
      id-token: write # npm OIDC trusted publishing (provenance)
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org/

      - run: yarn install --frozen-lockfile
      - run: yarn build

      - name: Use OIDC auth
        run: npm config delete //registry.npmjs.org/:_authToken

      - name: Publish to npm
        run: |
          VERSION="${{ needs.bump-versions.outputs.version }}"
          if [ "${{ needs.bump-versions.outputs.prerelease }}" = "true" ]; then
            DIST_TAG=$(echo "$VERSION" | grep -oE '(alpha|beta|rc|pre)' | head -1)
            npm publish --provenance --tag "${DIST_TAG:-prerelease}"
          else
            npm publish --provenance
          fi

  # ── publish a7p to pub.dev ───────────────────────────────────────────────
  publish-dart:
    needs: [bump-versions, create-release]
    runs-on: ubuntu-latest
    environment: pub
    permissions:
      id-token: write # pub.dev OIDC trusted publisher
    defaults:
      run:
        working-directory: dart
    steps:
      # `main` already has bump-versions' commit; the tag itself still
      # points at the pre-bump commit, so we can't just use github.ref.
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get
      - run: dart pub publish --dry-run
      - run: dart pub publish --force

  # ── attach go/ binaries (built by test-go's matrix) to the same Release ────
  # go/ has no separate registry to publish to and no version to bump (see
  # the bump-versions comment above) -- it's go-gettable at this same tag
  # already (module github.com/o-murphy/a7p). test-go (./.github/workflows/go.yml,
  # part of this same run via tests-passed -> bump-versions) already
  # cross-compiled and uploaded one "a7p-go-binaries-<os>.tar.gz" artifact
  # per OS in its matrix (already suffixed per-OS internally, since
  # ubuntu-latest/ubuntu-24.04-arm and windows-latest/windows-11-arm each
  # cross-compile the same GOARCH set and would otherwise collide), so this
  # just downloads and repacks them into one combined archive instead of
  # rebuilding -- softprops/action-gh-release upserts by tag_name, so it
  # doesn't need to wait on create-release specifically (only on
  # bump-versions, to stay after the version-bump commit).
  publish-go:
    needs: [bump-versions]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binaries built by test-go
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: a7p-binary-*

      - name: Combine per-OS tarballs into one release archive
        shell: bash
        run: |
          mkdir combined
          find artifacts -name '*.tar.gz' -exec tar xzf {} -C combined \;
          tar czf a7p-go-binaries.tar.gz -C combined .

      - name: Attach binaries to the release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: a7p-go-binaries.tar.gz
