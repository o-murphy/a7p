name: Release

# Triggered by pushing a tag like v1.2.3 -- that tag must already be sitting
# on a commit where py/js/dart/go are fully consistent with it:
#   - py's version comes from the tag itself (via setuptools_scm, root=".."
#     in py/pyproject.toml, `git describe` against this exact commit) --
#     which is why every job below checks out the tag (env.RELEASE_TAG),
#     never `main`. A commit sitting *after* the tag (like the old
#     bump-versions job used to push) makes `git describe` report a
#     "N commits past the tag" dev version, e.g. 1.2.3.dev1+gXXXXXXX -- PyPI
#     rejects local versions like that outright.
#   - dart/pubspec.yaml and js/package.json must already read the tag's
#     version, and CHANGELOG.md must already have a "## [X.Y.Z] - DATE"
#     heading (not just [Unreleased]) for it, with py/js/dart/go/CHANGELOG.md
#     already regenerated from it.
#
# Run `scripts/ci/prepare_release.py X.Y.Z` locally to prepare all of the
# above as uncommitted edits for you to review, then commit + push to main
# + tag yourself -- see that script's docstring. verify-release below only
# checks this is all true; it never fixes anything on your behalf, so a
# release with any of it missing fails loudly instead of silently
# publishing something inconsistent.
on:
  push:
    tags:
      - "v*"

env:
  RELEASE_TAG: ${{ github.ref_name }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── run each package's own CI as reusable workflows ─────────────────────
  test-python:
    uses: ./.github/workflows/py.yml

  test-js:
    uses: ./.github/workflows/js.yml

  test-dart:
    uses: ./.github/workflows/dart.yml

  test-go:
    uses: ./.github/workflows/go.yml

  # Single guard job downstream jobs depend on, instead of each repeating
  # the full test-* job list -- adding a language later only means adding
  # it here, not hunting down every job's `needs:`.
  tests-passed:
    needs: [test-python, test-js, test-dart, test-go]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All test legs passed."

  # ── verify the tag's commit already has consistent versions/changelogs
  # everywhere -- no writes, no commits. Fails the whole release instead of
  # auto-fixing anything; see scripts/ci/prepare_release.py for the local
  # tool that gets a commit into this state before you tag it ─────────────
  verify-release:
    needs: tests-passed
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      # Checking out the tag itself (not main) is the point: this is the
      # exact commit publish-py/js/dart/go will build from, so whatever's
      # wrong here is exactly what would otherwise break publishing.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ env.RELEASE_TAG }}

      - name: Extract version and detect pre-release
        id: meta
        run: |
          VERSION="${RELEASE_TAG#v}"
          if [[ "$RELEASE_TAG" =~ (alpha|beta|rc) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # py isn't checked here: setuptools_scm (py/pyproject.toml, root="..")
      # derives its version directly from this same tag, so there's no
      # separate field that could drift. go/ has no version field either,
      # for a stronger reason -- go.mod lives at the repo root (module
      # github.com/o-murphy/a7p, see docs/DESIGN-schema-unification.md), so
      # this same "v*" tag *is* its module version already.
      - name: dart/pubspec.yaml and js/package.json must already read this tag's version
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          DART_VERSION="$(grep '^version:' dart/pubspec.yaml | awk '{print $2}')"
          JS_VERSION="$(grep '"version":' js/package.json | sed -E 's/.*"version": "([^"]*)".*/\1/')"
          fail=0
          if [ "$DART_VERSION" != "$VERSION" ]; then
            echo "dart/pubspec.yaml has version $DART_VERSION, expected $VERSION"
            fail=1
          fi
          if [ "$JS_VERSION" != "$VERSION" ]; then
            echo "js/package.json has version $JS_VERSION, expected $VERSION"
            fail=1
          fi
          if [ "$fail" = 1 ]; then
            echo "Run scripts/ci/prepare_release.py $VERSION locally, commit, and re-tag."
            exit 1
          fi

      - name: CHANGELOG.md must already have a "## [$VERSION]" heading (not just [Unreleased])
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          V_RE="${VERSION//./\\.}"
          if ! grep -qE "^## \[$V_RE\]" CHANGELOG.md; then
            echo "CHANGELOG.md has no '## [$VERSION]' heading -- run scripts/ci/prepare_release.py $VERSION locally, commit, and re-tag."
            exit 1
          fi

      - name: py/js/dart/go CHANGELOG.md must already be synced from the root file
        run: python3 scripts/ci/sync_changelogs.py --check

  # ── create the GitHub release ────────────────────────────────────────────
  create-release:
    needs: verify-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # fetch-tags: true -- actions/checkout@v7 defaults this to false
      # independently of fetch-depth: 0.
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ needs.verify-release.outputs.version }}"
          ./scripts/ci/extract-changelog.sh "$VERSION" CHANGELOG.md > /tmp/release_notes.md

          if [ ! -s /tmp/release_notes.md ]; then
            echo "No changelog entry found for $VERSION (or [Unreleased]) in CHANGELOG.md -- add one first"
            exit 1
          fi

          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${RELEASE_TAG}$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            {
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${RELEASE_TAG}"
            } >> /tmp/release_notes.md
          fi

          echo "--- release notes ---"
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: /tmp/release_notes.md
          prerelease: ${{ needs.verify-release.outputs.prerelease }}

  # ── publish a7p to PyPI ──────────────────────────────────────────────────
  publish-py:
    needs: [verify-release, create-release]
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write # PyPI trusted publishing
    defaults:
      run:
        working-directory: py
    steps:
      # fetch-depth: 0 AND fetch-tags: true -- setuptools_scm derives the
      # version from the git tag via `git describe`; py/pyproject.toml's
      # [tool.setuptools_scm] root=".." points it at this checkout's root.
      # Checking out the tag itself (not main) is required: verify-release
      # already guarantees this exact commit is the one carrying the tag,
      # with no later commits that would make `git describe` report a
      # "past the tag" dev version.
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990

      - name: Install the project
        run: uv sync --dev

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish --trusted-publishing always

  # ── publish a7p-js to npm ────────────────────────────────────────────────
  publish-js:
    needs: [verify-release, create-release]
    runs-on: ubuntu-latest
    environment: npmjs
    permissions:
      id-token: write # npm OIDC trusted publishing (provenance)
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org/

      - run: yarn install --frozen-lockfile
      - run: yarn build

      - name: Use OIDC auth
        run: npm config delete //registry.npmjs.org/:_authToken

      - name: Publish to npm
        run: |
          VERSION="${{ needs.verify-release.outputs.version }}"
          if [ "${{ needs.verify-release.outputs.prerelease }}" = "true" ]; then
            DIST_TAG=$(echo "$VERSION" | grep -oE '(alpha|beta|rc|pre)' | head -1)
            npm publish --provenance --tag "${DIST_TAG:-prerelease}"
          else
            npm publish --provenance
          fi

  # ── publish a7p to pub.dev ───────────────────────────────────────────────
  publish-dart:
    needs: [verify-release, create-release]
    runs-on: ubuntu-latest
    environment: pub
    permissions:
      id-token: write # pub.dev OIDC trusted publisher
    defaults:
      run:
        working-directory: dart
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get
      - run: dart pub publish --dry-run
      - run: dart pub publish --force

  # ── attach go/ binaries (built by test-go's matrix) to the same Release ────
  # go/ has no separate registry to publish to and no version to bump (see
  # verify-release's comment above) -- it's go-gettable at this same tag
  # already (module github.com/o-murphy/a7p). test-go (./.github/workflows/go.yml,
  # part of this same run via tests-passed -> verify-release) already
  # cross-compiled and uploaded one "a7p-go-binaries-<os>.tar.gz" artifact
  # per OS in its matrix (already suffixed per-OS internally, since
  # ubuntu-latest/ubuntu-24.04-arm and windows-latest/windows-11-arm each
  # cross-compile the same GOARCH set and would otherwise collide), so this
  # just downloads and repacks them into one combined archive instead of
  # rebuilding -- softprops/action-gh-release upserts by tag_name, so it
  # doesn't need to wait on create-release specifically (only on
  # verify-release, to confirm the tag is publishable).
  publish-go:
    needs: [verify-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binaries built by test-go
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: a7p-binary-*

      - name: Combine per-OS tarballs into one release archive
        shell: bash
        run: |
          mkdir combined
          find artifacts -name '*.tar.gz' -exec tar xzf {} -C combined \;
          tar czf a7p-go-binaries.tar.gz -C combined .

      - name: Attach binaries to the release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: a7p-go-binaries.tar.gz
