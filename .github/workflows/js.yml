name: JS

on:
  push:
    paths:
      - "js/**"
      - "proto/**"
      - "schema/**"
      - ".github/workflows/js.yml"
  pull_request:
    paths:
      - "js/**"
      - "proto/**"
      - "schema/**"
      - ".github/workflows/js.yml"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: js-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint (typecheck) ────────────────────────────────────────────────────────
  lint:
    name: Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./js

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "yarn"
          cache-dependency-path: js/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: npx tsc --noEmit -p .

  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./js

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "yarn"
          cache-dependency-path: js/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./js

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "yarn"
          cache-dependency-path: js/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build
