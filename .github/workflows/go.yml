name: GoLang

on:
  push:
    paths:
      - "go/**"
      - "proto/**"
      - "schema/**"
      - ".github/workflows/go.yml"
  pull_request:
    paths:
      - "go/**"
      - "proto/**"
      - "schema/**"
      - ".github/workflows/go.yml"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: go-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint (go vet + gofmt) moved to the go-vet/gofmt hooks in
  # .pre-commit-config.yaml, run by .github/workflows/pre-commit.yml.
  # Schema/proto drift guard moved to the go-schema-proto-drift-guard hook
  # in the same file.

  # ── Build & Test ──────────────────────────────────────────────────────────────
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: # One for each OS
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-latest

    defaults:
      run:
        working-directory: ./go

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ">=1.26.5"

      - name: Run Go version
        run: go version

      - name: Run tests
        run: make test

      - name: Build using Make
        run: make

      - name: Suffix binaries with the runner OS
        # The Makefile's cross-compile branches only on host OS (uname/OS),
        # not host architecture -- so ubuntu-latest/ubuntu-24.04-arm (and
        # windows-latest/windows-11-arm) each produce identically-named
        # files (e.g. both "a7p-linux-amd64"). GitHub Release assets must
        # have unique filenames, so suffix every built file with this job's
        # matrix.os before it's uploaded/merged with the other runners'.
        shell: bash
        run: |
          cd dist
          for f in a7p-*; do
            case "$f" in
              *.exe) mv "$f" "${f%.exe}-${{ matrix.os }}.exe" ;;
              *.wasm) mv "$f" "${f%.wasm}-${{ matrix.os }}.wasm" ;;
              *) mv "$f" "$f-${{ matrix.os }}" ;;
            esac
          done

      - name: List dist directory contents
        shell: bash
        run: |
          ls -la dist/

      - name: Package binaries into a tarball
        shell: bash
        run: tar czf a7p-go-binaries-${{ matrix.os }}.tar.gz -C dist .

      - name: Upload binaries
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: a7p-binary-${{ matrix.os }}
          path: go/a7p-go-binaries-${{ matrix.os }}.tar.gz
