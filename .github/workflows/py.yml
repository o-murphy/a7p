name: Python

on:
  push:
    paths:
      - "py/**"
      - "proto/**"
      - "schema/**"
      - ".github/workflows/py.yml"
  pull_request:
    paths:
      - "py/**"
      - "proto/**"
      - "schema/**"
      - ".github/workflows/py.yml"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: py-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./py

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync

      - name: Run ruff
        run: uv run ruff check

  test:
    name: Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./py

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest
