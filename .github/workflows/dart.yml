name: Dart

on:
  push:
    paths:
      - "dart/**"
      - "proto/**"
      - "schema/**"
      - ".github/workflows/dart.yml"
  pull_request:
    paths:
      - "dart/**"
      - "proto/**"
      - "schema/**"
      - ".github/workflows/dart.yml"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: dart-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Analyze (dart analyze + format check) moved to the dart-analyze/
  # dart-format hooks in .pre-commit-config.yaml, run by
  # .github/workflows/pre-commit.yml.

  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./dart
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run tests
        run: dart test

  # pub.dev publish dry-run moved to the dart-publish-dry-run hook in
  # .pre-commit-config.yaml, run by .github/workflows/pre-commit.yml.
