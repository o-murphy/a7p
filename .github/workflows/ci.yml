name: CI

on:
  push:
    branches: [master]
    paths: &ci-paths
      - "lib/**"
      - "test/**"
      - "bin/**"
      - "proto/**"
      - "pubspec.yaml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths: *ci-paths

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Analyze ──────────────────────────────────────────────────────────────────
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test bin

  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run tests
        run: dart test

  # ── pub.dev publish dry-run ───────────────────────────────────────────────────
  publish-dry-run:
    name: pub.dev dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Publish dry-run
        run: dart pub publish --dry-run
