default_install_hook_types: [pre-commit]
default_language_version:
  python: python3

repos:
  - repo: local
    hooks:
      # py/
      - id: uv-lock
        name: uv lock check
        entry: uv
        args: ["lock", "--check"]
        language: system
        pass_filenames: false
        files: '^(pyproject\.toml|uv\.lock)$'

      - id: uv-sync
        name: uv sync before hooks (py)
        entry: uv
        args: ["--project", "py", "sync"]
        language: system
        pass_filenames: false
        files: '^py/.*\.py$'

      - id: uv-ruff-check
        name: ruff lint & fix (py)
        entry: bash -c 'cd py && uv run ruff check --fix'
        language: system
        pass_filenames: false
        files: '^py/.*\.py$'

      - id: uv-ruff-format
        name: ruff format (py)
        entry: bash -c 'cd py && uv run ruff format'
        language: system
        pass_filenames: false
        files: '^py/.*\.py$'

      - id: uv-mypy
        name: mypy (py)
        entry: bash -c 'cd py && uv run mypy'
        language: system
        pass_filenames: false
        files: '^py/.*\.py$'

      - id: uv-pytest
        name: pytest (py)
        entry: bash -c 'cd py && uv run pytest'
        language: system
        pass_filenames: false
        files: '^py/.*\.py$'

      # js/
      - id: yarn-install
        name: yarn install before hooks (js)
        entry: bash -c 'cd js && yarn install --frozen-lockfile'
        language: system
        pass_filenames: false
        files: '^js/.*\.(js|mjs|cjs|ts)$'

      - id: prettier-js
        name: prettier format (js)
        entry: bash -c 'cd js && yarn --silent format'
        language: system
        pass_filenames: false
        files: '^js/.*\.(js|mjs|cjs|ts)$'
        exclude: "^js/src/generated/"

      - id: tsc-js
        name: tsc typecheck (js)
        entry: bash -c 'cd js && npx tsc --noEmit -p .'
        language: system
        pass_filenames: false
        files: '^js/.*\.(js|mjs|cjs|ts)$'

      - id: jest-js
        name: jest (js)
        entry: bash -c 'cd js && yarn --silent test'
        language: system
        pass_filenames: false
        files: '^js/.*\.(js|mjs|cjs|ts)$'

      - id: build-js
        name: yarn build (js)
        entry: bash -c 'cd js && yarn --silent build'
        language: system
        pass_filenames: false
        files: '^js/.*\.(js|mjs|cjs|ts)$'

      # dart/
      - id: dart-pub-get
        name: dart pub get before hooks (dart)
        entry: bash -c 'cd dart && dart pub get'
        language: system
        pass_filenames: false
        files: '^dart/.*\.dart$'

      - id: dart-format
        name: dart format (dart)
        entry: bash -c 'cd dart && dart format lib test bin'
        language: system
        pass_filenames: false
        files: '^dart/.*\.dart$'

      - id: dart-analyze
        name: dart analyze (dart)
        entry: bash -c 'cd dart && dart analyze --fatal-infos'
        language: system
        pass_filenames: false
        files: '^dart/.*\.dart$'

      - id: dart-test
        name: dart test (dart)
        entry: bash -c 'cd dart && dart test'
        language: system
        pass_filenames: false
        files: '^dart/.*\.dart$'

      - id: dart-publish-dry-run
        name: dart pub publish --dry-run (dart)
        entry: bash -c 'cd dart && dart pub publish --dry-run'
        language: system
        pass_filenames: false
        files: '^dart/(.*\.dart|pubspec\.yaml)$'

      # go/ -- go.mod/go.sum live at the repo root (not go/), see
      # docs/DESIGN-schema-unification.md's step 8, hence the wider files:
      # pattern here (matches gofmt/go-vet/go-test scoped to go/*.go, but
      # also triggers on a root go.mod/go.sum change alone).
      - id: go-mod-download
        name: go mod download before hooks (go)
        entry: bash -c 'cd go && go mod download'
        language: system
        pass_filenames: false
        files: '^(go\.mod|go\.sum|go/.*\.go)$'

      - id: gofmt
        name: gofmt (go)
        entry: bash -c 'cd go && gofmt -w -l .'
        language: system
        pass_filenames: false
        files: '^go/.*\.go$'

      - id: go-vet
        name: go vet (go)
        entry: bash -c 'cd go && go vet ./...'
        language: system
        pass_filenames: false
        files: '^go/.*\.go$'

      - id: go-test
        name: go test (go)
        entry: bash -c 'cd go && go test ./...'
        language: system
        pass_filenames: false
        files: '^go/.*\.go$'

      - id: go-schema-proto-drift-guard
        name: schema/proto drift guard (go)
        # Needs protoc + protoc-gen-go on $PATH (same as go.yml's old
        # drift-guard job) -- regenerates go/'s checked-in generated files
        # from schema/a7p.schema.json + proto/profedit.proto and fails if
        # that produces a diff (i.e. someone edited the schema/proto but
        # forgot to regenerate).
        entry: bash -c 'export PATH="$PATH:$(go env GOPATH)/bin" && uv run --project py python3 scripts/compile.py --go && bash scripts/generate_proto.sh --go && git diff --exit-code go/a7p/generated/a7p_schema.g.json go/a7p/profedit/profedit.pb.go'
        language: system
        pass_filenames: false
        files: '^(schema/a7p\.schema\.json|proto/profedit\.proto|go/a7p/generated/a7p_schema\.g\.json|go/a7p/profedit/profedit\.pb\.go)$'

      # root -- keeps py/js/dart/go's own CHANGELOG.md in sync with the
      # root one whenever it changes (see scripts/ci/sync_changelogs.py).
      # Stdlib-only script, but runs through py's uv env for the same
      # reason as the other py/ hooks above: a consistent, known
      # interpreter instead of whatever bare `python3` resolves to.
      - id: sync-changelogs
        name: sync CHANGELOGs (root -> py/js/dart/go)
        entry: uv
        args:
          ["run", "--project", "py", "python3", "scripts/ci/sync_changelogs.py"]
        language: system
        pass_filenames: false
        files: '^CHANGELOG\.md$'
